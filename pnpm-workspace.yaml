packages:
  - "apps/*"
onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - msgpackr-extract
  - prisma
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  cpu-features: set this to true or false
  esbuild: true
  msgpackr-extract: true
  prisma: true
  ssh2: set this to true or false
